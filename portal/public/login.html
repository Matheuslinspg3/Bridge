<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ClaudBridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <div class="header">
    <div class="logo">⚡ <span>ClaudBridge</span></div>
    <nav>
      <a href="/portal/">Início</a>
      <a href="/portal/register.html">Cadastro</a>
    </nav>
  </div>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Entrar</h2>
      <p class="subtitle">Acesse seu painel ClaudBridge</p>
      <div id="error" class="alert alert-error hidden"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn" style="width:100%;margin-top:0.5rem">Entrar</button>
      </form>
      <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--text2)">
        Não tem conta? <a href="/portal/register.html">Criar conta</a>
      </p>
    </div>
  </div>
  <script src="portal.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error');
      err.classList.add('hidden');
      const res = await fetch('/portal/api/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
      });
      const data = await res.json();
      if (!res.ok) { err.textContent = data.error; err.classList.remove('hidden'); return; }
      localStorage.setItem('portal_token', data.token);
      window.location.href = '/portal/dashboard.html';
    });
  </script>
</body>
</html>
